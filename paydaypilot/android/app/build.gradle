plugins {
    id 'com.android.application'
}

android {
    namespace 'com.paydaypilot.app'
    compileSdk 34

    defaultConfig {
        applicationId 'com.paydaypilot.app'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    // Sideload signing key (checked in on purpose: it only exists so
    // successive builds are update-compatible on the same device — it grants
    // nothing and protects nothing).
    signingConfigs {
        sideload {
            storeFile file('../signing/paydaypilot.keystore')
            storePassword 'paydaypilot'
            keyAlias 'paydaypilot'
            keyPassword 'paydaypilot'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.sideload
        }
        debug {
            signingConfig signingConfigs.sideload
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
