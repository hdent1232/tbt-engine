name: build-paydaypilot

on:
  push:
    tags: ["paydaypilot-v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: paydaypilot
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m tests.test_smoke

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: >
          pyinstaller --onefile --name PayDayPilot
          --add-data "app/static;app/static"
          run.py

      - uses: actions/upload-artifact@v4
        with:
          name: PayDayPilot
          path: paydaypilot/dist/PayDayPilot.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: paydaypilot/dist/PayDayPilot.exe
