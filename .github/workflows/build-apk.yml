name: build-apk

on:
  push:
    branches: ["claude/desktop-finance-app-o0nfuc", "main", "master"]
    paths:
      - "paydaypilot/android/**"
      - "paydaypilot/app/static/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: paydaypilot/android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Bundle web app into assets
        run: python3 prepare_assets.py

      - name: Build APK
        run: gradle assembleRelease --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk PayDayPilot.apk

      - uses: actions/upload-artifact@v4
        with:
          name: PayDayPilot-apk
          path: paydaypilot/android/PayDayPilot.apk

      - name: Publish to "android-latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-latest
          name: PayDay Pilot — Android APK (latest)
          prerelease: true
          body: |
            Sideload build of PayDay Pilot for Android, rebuilt automatically
            from the latest source. Download `PayDayPilot.apk` below, open it
            on your phone, and allow "install unknown apps" when prompted.
            Fully offline — all data stays on your device.
          files: paydaypilot/android/PayDayPilot.apk
